version: '3.4'

services:
  postgres:
    image: postgres:alpine
    ports: 
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: "secret"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 5s
      timeout: 5s
      retries: 5
  pgbouncer:
    image: pgbouncer/pgbouncer
    ports: 
      - "5440:5439"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASES_HOST: "postgres"
      DATABASES_PORT: "5432"
      DATABASES_USER: "postgres"
      DATABASES_PASSWORD: "secret"
      DATABASES_DBNAME: "url_shortener"
      PGBOUNCER_LISTEN_PORT: "5439"
  redis:
    image: redis:alpine
    ports: 
      - "6380:6379"